<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Score Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .filter-section { margin: 15px 0; text-align: left; }
        .filter-section select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 15px; }
        .scores-table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; font-size: 14px; }
        .scores-table th, .scores-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .scores-table th { background: #f8f9fa; color: #333; }
        .score-badge { font-weight: bold; color: #007bff; }
        .class-badge { font-size: 14px; color: #666; font-weight: normal; margin-top: -5px; display: block; }
    </style>
</head>
<body>

    <div class="container" style="max-width: 500px;">
        <h2>Check Your Exam Scores</h2>
        <p>Enter your fixed 5-character student code below:</p>
        <div class="tabs" style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button id="scoreTab" style="flex: 1; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">Exam Scores</button>
            <button id="pointTab" style="flex: 1; padding: 10px; background: #ddd; color: #333; border: none; border-radius: 4px; cursor: pointer;">Behavior Points</button>
        </div>
        <div class="search-box">
            <input type="text" id="studentCode" placeholder="e.g. GWBFX" maxlength="5">
            <button id="searchBtn">🔍</button>
        </div>

        <div id="resultCard" class="result-card hidden">
            <div class="result-info">
                <h3 id="studentNameDisplay" style="margin-bottom: 2px;">Student Name</h3>
                <span id="studentClassDisplay" class="class-badge">Grade 7A</span>
                
                <div class="filter-section">
                    <label for="subjectFilter" style="font-size: 12px; color:#666; font-weight:bold;">Filter By Subject:</label>
                    <select id="subjectFilter"></select>
                </div>

                <table class="scores-table" id="scoresTable">
                    <thead>
                        <tr>
                            <th>Test / Exam</th>
                            <th>Subject</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <p id="errorMessage" class="error hidden">Code not found or no scores recorded. Please try again.</p>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
