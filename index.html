<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Score Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Check Your Exam Score</h2>
        <p>Enter your unique 5-character code below:</p>
        
        <div class="search-box">
            <input type="text" id="studentCode" placeholder="e.g. A7X9Q" maxlength="5">
            <button id="searchBtn">🔍</button>
        </div>

        <div id="resultCard" class="result-card hidden">
            <div class="result-info">
                <h3 id="studentName">Student Name</h3>
                <p><strong>Exam:</strong> <span id="examName">Exam Name</span></p>
                <p><strong>Subject:</strong> <span id="subjectName">Subject Name</span></p>
                <div class="score-display">
                    Score: <span id="examScore">100</span>
                </div>
            </div>
        </div>

        <p id="errorMessage" class="error hidden">Code not found. Please try again.</p>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
